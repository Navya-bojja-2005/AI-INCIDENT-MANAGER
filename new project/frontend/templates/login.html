{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-box glass">
        <h2 style="text-align: center;">Login</h2>

        {% if error %}
        <div
            style="background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Company Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your company email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" style="width: 100%;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
